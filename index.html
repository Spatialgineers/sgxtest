<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX Spatial App</title>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; }
        
        /* Contenedor del App que Three.js leerá para crear la pantalla flotante */
        #sgx-spatial-ui {
            position: absolute;
            width: 800px; height: 600px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #32527B; border-top: 6px solid #FDCC0D;
            border-radius: 12px; padding: 40px; box-sizing: border-box;
            
            /* Estado Desktop: Centrado en pantalla */
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; overflow-y: auto;
        }

        /* Cuando entra a VR, escondemos el DOM físico para que no estorbe al canvas WebGL */
        #sgx-spatial-ui.vr-mode { z-index: -1; left: -9999px; transform: none; }

        #scene-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* El botón de VR de Three.js siempre arriba */
        #VRButton { z-index: 9999 !important; background: #FDCC0D !important; color: #000 !important; font-weight: 900 !important; border: none !important; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                       "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="sgx-spatial-ui">
        <!-- Ejemplo de un App 2D Normal -->
<style>
  .app-container { text-align: center; font-family: sans-serif; }
  .btn { background: #FDCC0D; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
  .display { background: #111; color: #00ffa3; padding: 20px; font-size: 1.5rem; font-family: monospace; border: 1px solid #32527B; margin-top: 20px; }
</style>

<div class="app-container">
    <h2 style="color: white; margin:0; font-size: 2rem;">GENERADOR DE IDEAS</h2>
    <p style="color: #888;">Panel Espacial Interactivo</p>
    
    <div id="output" class="display">Esperando comando...</div>
    <button class="btn" onclick="generate()">EJECUTAR</button>
</div>

<script>
    const ideas = ['Crear Gemelo Digital', 'Integrar WebAR', 'Vender Tier 5', 'Programar XR Maze'];
    function generate() {
        const rand = ideas[Math.floor(Math.random() * ideas.length)];
        document.getElementById('output').innerText = '>> ' + rand;
    }
</script>
            
    </div>

    <div id="scene-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
        import { HTMLMesh } from 'three/addons/interactive/HTMLMesh.js';
        import { InteractiveGroup } from 'three/addons/interactive/InteractiveGroup.js';

        let camera, scene, renderer, cameraGroup;
        let interactiveGroup, uiMesh;
        const appLayer = document.getElementById('sgx-spatial-ui');

        init();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.05);

            cameraGroup = new THREE.Group();
            scene.add(cameraGroup);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            cameraGroup.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.getElementById('scene-container').appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Entorno visual de fondo
            const grid = new THREE.GridHelper(50, 50, 0x32527B, 0x111111);
            grid.position.y = -1.5;
            scene.add(grid);
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));

            interactiveGroup = new InteractiveGroup(renderer, camera);
            scene.add(interactiveGroup);

            // BIFURCACIÓN DE ESTADO: VR vs DESKTOP
            renderer.xr.addEventListener('sessionstart', () => {
                appLayer.classList.add('vr-mode'); // Esconder DOM físico
                
                if (!uiMesh) {
                    uiMesh = new HTMLMesh(appLayer);
                    uiMesh.position.set(0, 1.5, -1.5); // Altura ojos, 1.5m adelante
                    uiMesh.scale.setScalar(2);
                    interactiveGroup.add(uiMesh);
                }
            });

            renderer.xr.addEventListener('sessionend', () => {
                appLayer.classList.remove('vr-mode'); // Mostrar DOM físico
                if (uiMesh) {
                    interactiveGroup.remove(uiMesh);
                    uiMesh.dispose();
                    uiMesh.material.map.dispose();
                    uiMesh.material.dispose();
                    uiMesh = null;
                }
            });

            // Controladores (Lasers)
            const controllerModelFactory = new XRControllerModelFactory();
            const laserGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]);
            const laserMat = new THREE.LineBasicMaterial({ color: 0xFDCC0D, linewidth: 2 });

            const setupController = (index) => {
                const controller = renderer.xr.getController(index);
                scene.add(controller);
                const grip = renderer.xr.getControllerGrip(index);
                grip.add(controllerModelFactory.createControllerModel(grip));
                scene.add(grip);
                const line = new THREE.Line(laserGeo, laserMat);
                line.scale.z = 5;
                controller.add(line);
                interactiveGroup.listenToXRControllerEvents(controller);
            };

            setupController(0);
            setupController(1);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            renderer.setAnimationLoop(() => {
                if (!renderer.xr.isPresenting) {
                    // Sutil movimiento de cámara en desktop para efecto 3D
                    cameraGroup.rotation.y += 0.001; 
                } else {
                    cameraGroup.rotation.y = 0;
                }
                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
