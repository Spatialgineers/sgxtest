<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spatialgram - Production Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000; /* Fondo negro para que en set se pierda el borde de la pantalla */
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
        }
        
        /* Mobile Container Restricto */
        #mobile-viewport {
            width: 100%;
            max-width: 400px; /* Ancho estándar de móvil */
            height: 100dvh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #262626;
            border-right: 1px solid #262626;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .post-media { aspect-ratio: 4 / 5; object-fit: cover; width: 100%; background-color: #1a1a1a; }
        
        .icon-btn { 
            width: 24px; 
            height: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon-btn svg { width: 100%; height: 100%; transition: transform 0.1s; }
        .icon-btn:active svg { transform: scale(0.9); }

        /* Lógica Visual del Like Animado */
        .like-btn.liked svg {
            fill: #ff3040;
            stroke: #ff3040;
            animation: heartPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="mobile-viewport">
        <header class="p-4 flex justify-between items-center bg-black sticky top-0 z-50 border-b border-[#262626]">

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.38 8.38 0 0 1 3.9.9L23 3l-1.5 6.5z"></path></svg>
            </div>
        </header>

        <main id="feed" class="no-scrollbar overflow-y-auto flex-1 pb-10"></main>

        // Renderizado automático de los 20 posts
        feedContainer.innerHTML = postData.map(post => createPost(post)).join('');

</body>
</html>
