<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SGX 3D Mask VisGen (Absolute Control)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: monospace; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        video { z-index: 1; opacity: 0.8; }
        canvas { z-index: 2; pointer-events: none; }
        
        #ui-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.9); padding: 15px; border-radius: 8px;
            color: #00ff00; border: 1px solid #00ff00; width: 320px;
            box-shadow: 0 0 15px rgba(0,255,0,0.2); transition: all 0.3s;
        }
        #ui-header { cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #ui-content { display: block; margin-top: 15px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
        input[type="text"] { width: 100%; background: #222; border: 1px solid #555; color: #00ff00; padding: 5px; box-sizing: border-box; }
        input[type="range"] { width: 100%; margin-top: 5px; }
        
        .toggles { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; font-size: 12px; background: #222; padding: 10px; border-radius: 5px;}
        .toggles label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        #export-btn {
            width: 100%; padding: 10px; background: #00ff00; color: #000;
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase;
            font-family: monospace; font-size: 14px;
        }
        #export-btn:hover { background: #00cc00; }
        #log { position: absolute; top: 10px; left: 10px; z-index: 10; color: #00ff00; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="log">Iniciando SGX VisGen...</div>
    
    <div id="ui-panel">
        <div id="ui-header">
            <span>⚙️ SGX Controles</span>
            <span id="ui-toggle">▼</span>
        </div>
        <div id="ui-content">
            <div class="input-group">
                <label>GLB Asset URL:</label>
                <input type="text" id="asset-url" value="https://static.wixstatic.com/3d/fe81a7_cf1ed4e58d0048efa955f39d347a9466.glb">
                <button id="load-btn" style="width:100%; margin-top:5px; padding:5px; cursor:pointer; background:#444; color:#fff; border:none;">Cargar Modelo</button>
            </div>
            
            <div class="toggles">
                <label><input type="checkbox" id="mirror-pos" checked> 🪞 Mirror Posición (Izq/Der)</label>
                <label><input type="checkbox" id="flip-x"> 🔄 Invertir Rot X (Arriba/Abajo)</label>
                <label><input type="checkbox" id="flip-y" checked> 🔄 Invertir Rot Y (Giro Izq/Der)</label>
                <label><input type="checkbox" id="flip-z" checked> 🔄 Invertir Rot Z (Inclinación)</label>
            </div>

            <div class="input-group">
                <label>Scale: <span id="val-scale">10.0</span></label>
                <input type="range" id="slide-scale" min="0.1" max="20" step="0.1" value="10">
            </div>
            <div class="input-group">
                <label>Offset Y (Alto): <span id="val-y">1.4</span></label>
                <input type="range" id="slide-y" min="-10" max="10" step="0.1" value="1.4">
            </div>
            <div class="input-group">
                <label>Offset Z (Profundidad): <span id="val-z">0.4</span></label>
                <input type="range" id="slide-z" min="-10" max="10" step="0.1" value="0.4">
            </div>
            <button id="export-btn">⬇ Exportar WebAR</button>
        </div>
    </div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FilesetResolver, FaceLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs';

        // Lógica Colapsable
        document.getElementById('ui-header').addEventListener('click', () => {
            const content = document.getElementById('ui-content');
            const toggle = document.getElementById('ui-toggle');
            if (content.style.display === 'none') {
                content.style.display = 'block'; toggle.innerText = '▼';
            } else {
                content.style.display = 'none'; toggle.innerText = '▲';
            }
        });

        // Estado Global
        let config = { 
            url: document.getElementById('asset-url').value, 
            scale: 10.0, y: 1.4, z: 0.4, 
            mirrorPos: true, flipX: false, flipY: true, flipZ: true 
        };

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const log = document.getElementById('log');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;
        
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        scene.add(new THREE.AmbientLight(0xffffff, 2.0));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(0, 5, 5);
        scene.add(dirLight);

        const faceGroup = new THREE.Group(); 
        scene.add(faceGroup);
        faceGroup.visible = false;

        let maskMesh;
        const loader = new GLTFLoader();

        function loadModel() {
            if(maskMesh) faceGroup.remove(maskMesh);
            log.innerText = "Cargando modelo...";
            loader.load(config.url, (gltf) => {
                maskMesh = gltf.scene;
                updateMeshTransforms();
                faceGroup.add(maskMesh);
                log.innerText = "Tracking Absoluto Activo.";
            });
        }

        function updateMeshTransforms() {
            if(!maskMesh) return;
            maskMesh.scale.setScalar(config.scale);
            maskMesh.position.set(0, config.y, config.z);
        }

        loadModel();

        // UI Listeners (Toggles)
        document.getElementById('load-btn').addEventListener('click', () => { config.url = document.getElementById('asset-url').value; loadModel(); });
        document.getElementById('mirror-pos').addEventListener('change', (e) => { config.mirrorPos = e.target.checked; });
        document.getElementById('flip-x').addEventListener('change', (e) => { config.flipX = e.target.checked; });
        document.getElementById('flip-y').addEventListener('change', (e) => { config.flipY = e.target.checked; });
        document.getElementById('flip-z').addEventListener('change', (e) => { config.flipZ = e.target.checked; });
        
        // UI Listeners (Sliders)
        ['scale', 'y', 'z'].forEach(id => {
            document.getElementById(`slide-${id}`).addEventListener('input', (e) => {
                config[id] = parseFloat(e.target.value);
                document.getElementById(`val-${id}`).innerText = config[id].toFixed(1);
                updateMeshTransforms();
            });
        });

        // MediaPipe
        let faceLandmarker, lastVideoTime = -1;
        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                outputFaceBlendshapes: false,
                outputFacialTransformationMatrixes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        function predictWebcam() {
            if (lastVideoTime !== video.currentTime && faceLandmarker) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.facialTransformationMatrixes && results.faceLandmarks.length > 0) {
                    faceGroup.visible = true;
                    
                    // 1. POSICIÓN ABSOLUTA (Con Toggle de Espejo)
                    const nose = results.faceLandmarks[0][1];
                    
                    // Si mirrorPos es true, invertimos la X para que coincida con el CSS mirror
                    const multiplierX = config.mirrorPos ? -1 : 1;
                    const ndcX = multiplierX * ((nose.x * 2) - 1); 
                    const ndcY = -((nose.y * 2) - 1); // Y siempre se invierte por diferencias de sistema
                    
                    const vector = new THREE.Vector3(ndcX, ndcY, 0.5);
                    vector.unproject(camera);
                    const dir = vector.sub(camera.position).normalize();
                    const distance = -camera.position.z / dir.z; 
                    const pos = camera.position.clone().add(dir.multiplyScalar(distance));
                    
                    faceGroup.position.copy(pos);

                    // 2. ROTACIÓN MATRICIAL (Con Toggles Independientes)
                    const mpMatrix = new THREE.Matrix4().fromArray(results.facialTransformationMatrixes[0].data).transpose();
                    const p = new THREE.Vector3(), q = new THREE.Quaternion(), s = new THREE.Vector3();
                    mpMatrix.decompose(p, q, s);
                    
                    const euler = new THREE.Euler().setFromQuaternion(q);
                    
                    // Aplicar inversiones basadas en la UI
                    if(config.flipX) euler.x = -euler.x; // Arriba/Abajo
                    if(config.flipY) euler.y = -euler.y; // Izquierda/Derecha
                    if(config.flipZ) euler.z = -euler.z; // Inclinación
                    
                    faceGroup.quaternion.setFromEuler(euler);

                } else {
                    faceGroup.visible = false;
                }
            }
            renderer.render(scene, camera);
            window.requestAnimationFrame(predictWebcam);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initMediaPipe();

        // Placeholder para Exportar
        document.getElementById('export-btn').addEventListener('click', () => {
            log.innerText = "Exportador pendiente. Valida la calibración de ejes.";
        });
    </script>
</body>
</html>
