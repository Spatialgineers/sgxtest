<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spatialgram - Production Tool v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
        }
        
        #mobile-viewport {
            width: 100%;
            max-width: 400px;
            height: 100dvh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #262626;
            border-right: 1px solid #262626;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .post-media { aspect-ratio: 4 / 5; object-fit: cover; width: 100%; background-color: #1a1a1a; }
        
        .icon-btn { 
            width: 24px; 
            height: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon-btn svg { width: 100%; height: 100%; transition: transform 0.1s; }
        .icon-btn:active svg { transform: scale(0.9); }

        /* Botón Randomizer en el Header */
        #randomize-btn svg { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .like-btn.liked svg {
            fill: #ff3040;
            stroke: #ff3040;
            animation: heartPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="mobile-viewport">
        <header class="p-4 flex justify-between items-center bg-black sticky top-0 z-50 border-b border-[#262626]">
            <h1 class="text-xl font-bold tracking-tight italic">Spatialgram</h1>
            <div class="flex gap-4">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.38 8.38 0 0 1 3.9.9L23 3l-1.5 6.5z"></path></svg>
                <button id="randomize-btn" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.53-11.43l5.6 5.6"/></svg>
                </button>
            </div>
        </header>

        <main id="feed" class="no-scrollbar overflow-y-auto flex-1 pb-10"></main>
    </div>

    <script>
        // DATASET DE 20 POSTS
        let postData = [
            { id: 1, user: "el_broder_pr", img: "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?q=80&w=400", cap: "Metiéndole cabrón, voy a ti siempre mi bro. 💯🔥", date: "HACE 2 HORAS" },
            { id: 2, user: "mentemillonaria_oficial", img: "https://images.unsplash.com/photo-1553484771-371a605b060b?q=80&w=400", cap: "Guarda este post. 5 pasos para dejar tu 9 a 5 este año. El paso 3 te sorprenderá. 💸🧠 #Emprendimiento", date: "HACE 4 HORAS" },
            { id: 3, user: "doglovers_pr", img: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=400", cap: "El mejor compañero para un domingo de roadtrip. 🐶🚗", date: "HACE 5 HORAS" },
            { id: 4, user: "jangueo_vip", img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=400", cap: "La vibra de anoche estuvo a otro nivel. 🪩✨", date: "HACE 6 HORAS" },
            { id: 5, user: "hustle_culture", img: "https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=400", cap: "Mientras otros duermen, nosotros construimos. 💻☕", date: "HACE 8 HORAS" },
            { id: 6, user: "cafe_adicto", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?q=80&w=400", cap: "Necesario para sobrevivir el calor de hoy. 🧊☕", date: "HACE 9 HORAS" },
            { id: 7, user: "spatial_architect", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=400", cap: "Ingeniando Imaginación. El futuro es espacial. 🌍⚡ #Spatialgineers", date: "OCTOBER 24, 2022" },
            { id: 8, user: "foodie_boricua", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=400", cap: "El cheat meal que me merecía. 🍔🤤", date: "HACE 12 HORAS" },
            { id: 9, user: "autos_pr", img: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=400", cap: "Toyota Tacoma 2022. Cero detalles. DM para precio. 🛻🔥", date: "HACE 14 HORAS" },
            { id: 10, user: "masterclass_latam", img: "https://images.unsplash.com/photo-1556761175-5973dc0f32d7?q=80&w=400", cap: "Sponsorizado • Descubre el método exacto para escalar tu agencia a $10k/mes.", date: "PUBLICIDAD" },
            { id: 11, user: "crypto_king_pr", img: "https://images.unsplash.com/photo-1579621970588-a35d0e7ab9b6?q=80&w=400", cap: "Sponsorizado • Generé $5k desde mi celular esta semana. Link en mi bio para entrar al VIP. 🚀💸", date: "PUBLICIDAD" },
            { id: 12, user: "binance_es", img: "https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=400", cap: "Sponsorizado • El mercado se mueve rápido. ¿Estás posicionado? 📈₿", date: "PUBLICIDAD" },
            { id: 13, user: "daily_ai_art", img: "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=400", cap: "A beautiful surreal sunset in the cyber city. Generado con IA. 🤖🎨", date: "HACE 1 DÍA" },
            { id: 14, user: "future_visions", img: "https://images.unsplash.com/photo-1543857778-c4a1a3e0b2eb?q=80&w=400", cap: "Nature reclaiming the neon future. 🌿🏙️ #AI", date: "HACE 1 DÍA" },
            { id: 15, user: "midjourney_magik", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400", cap: "Space aesthetics. Prompt: realistic cyber space station 4k. 🧑‍🚀", date: "HACE 1 DÍA" },
            { id: 16, user: "synth_realities", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=400", cap: "The neural network dreaming in colors. 🧠✨ #Slop", date: "HACE 2 DÍAS" },
            { id: 17, user: "prompt_god", img: "https://images.unsplash.com/photo-1535223289827-42f1e9919769?q=80&w=400", cap: "Sentience initialized. Model version 4. 🤖", date: "HACE 2 DÍAS" },
            { id: 18, user: "gym_beast", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=400", cap: "El dolor de la disciplina pesa onzas, el del arrepentimiento pesa toneladas. 💪🔥", date: "HACE 2 DÍAS" },
            { id: 19, user: "lightning_fingers", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=400", cap: "Optimizando la malla para VR. El código nunca miente. 🛠️⚡ #Spatialgineers", date: "NOVEMBER 02, 2022" },
            { id: 20, user: "wanderlust_pr", img: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=400", cap: "Próxima parada: Tokyo. ✈️🇯🇵", date: "HACE 3 DÍAS" }
        ];

        const feedContainer = document.getElementById('feed');
        const randomizeBtn = document.getElementById('randomize-btn');
        let rotationDegree = 0;

        // Render Función
        function renderFeed() {
            feedContainer.innerHTML = postData.map(data => `
                <article class="py-4 border-b border-[#262626]">
                    <div class="flex items-center justify-between px-4 mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-700 to-gray-400 overflow-hidden">
                                <img src="${data.img}" class="w-full h-full object-cover opacity-50">
                            </div>
                            <span class="text-sm font-semibold">${data.user}</span>
                        </div>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                    </div>
                    
                    <img src="${data.img}" class="post-media" loading="lazy">
                    
                    <div class="px-4 py-3">
                        <div class="flex gap-4 mb-3">
                            <button onclick="this.classList.toggle('liked')" class="like-btn icon-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            </button>
                            <button class="icon-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.38 8.38 0 0 1 3.9.9L23 3l-1.5 6.5z"></path></svg>
                            </button>
                            <button class="icon-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                        <p class="text-sm mb-1"><span class="font-semibold mr-2">${data.user}</span>${data.cap}</p>
                        <p class="text-[10px] text-gray-500 uppercase mt-2 font-medium">${data.date}</p>
                    </div>
                </article>
            `).join('');
        }

        // Motor de Aleatoriedad (Fisher-Yates)
        randomizeBtn.addEventListener('click', () => {
            for (let i = postData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [postData[i], postData[j]] = [postData[j], postData[i]];
            }
            
            // UI Feedback: Girar el botón
            rotationDegree += 180;
            document.querySelector('#randomize-btn svg').style.transform = `rotate(${rotationDegree}deg)`;
            
            // Renderizar nuevo feed y subir el scroll al principio
            renderFeed();
            feedContainer.scrollTop = 0;
        });

        // Init
        renderFeed();
    </script>
</body>
</html>
