<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX Photobooth Sandbox - Level 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
        #canvas-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
        
        /* Camera Fix: Invisible pero activo en el DOM para que WebKit no apague el render loop */
        #input_video { position: absolute; opacity: 0; pointer-events: none; z-index: -10; }
        
        /* Interacción táctil y de mouse directa */
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; touch-action: none; cursor: grab; }
        canvas:active { cursor: grabbing; }
        
        /* SGX UI Panel */
        #ui-panel { width: 400px; background: #111; border-left: 2px solid #FDCC0D; display: flex; flex-direction: column; z-index: 10; }
        .panel-header { padding: 20px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .panel-content { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 15px; }
        
        .sgx-btn { background: #FDCC0D; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 5px; }
        .sgx-btn:hover { background: #fff; }
        .sgx-btn.danger { background: #ff3333; color: white; }
        input[type="text"] { background: #222; border: 1px solid #444; color: #FDCC0D; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        /* Layer Styles */
        .layer-card { background: #222; border: 1px solid #333; padding: 10px; border-left: 4px solid #FDCC0D; margin-bottom: 10px; }
        .layer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .layer-controls { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: center; font-size: 12px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #FDCC0D; }
        .order-btns button { background: #444; color: white; border: none; padding: 4px 8px; cursor: pointer; }
        .order-btns button:hover { background: #FDCC0D; color: black; }
        .del-btn { background: #ff3333; color: white; border: none; padding: 4px 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <video id="input_video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="ui-panel">
        <div class="panel-header">
            <h2 style="margin:0; color:#FDCC0D;">SGX.FrameBuilder</h2>
        </div>
        <div class="panel-content">
            <div>
                <input type="text" id="imgUrl" placeholder="URL de la imagen (Wix, Drive...)">
                <button class="sgx-btn" onclick="addLayer()">+ Inyectar Asset</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="sgx-btn" onclick="takePhoto()" style="flex:1;">📸 Capturar</button>
                <button class="sgx-btn danger" id="recordBtn" onclick="toggleRecording()" style="flex:1;">🔴 Grabar</button>
            </div>

            <hr style="border-color: #333; width: 100%;">
            
            <div id="layers-container">
                </div>
        </div>
    </div>

    <script>
        // --- 1. SETUP THREE.JS (CÁMARA ORTOGRÁFICA) ---
        const canvas = document.getElementById('output_canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, preserveDrawingBuffer: true, alpha: true });
        renderer.setSize(450, 800); // Proporción de móvil / Photobooth
        
        const scene = new THREE.Scene();
        
        // El espacio ortográfico anula la perspectiva 3D, dándote control 2D perfecto.
        const viewSize = 100;
        const aspect = 450 / 800;
        const camera = new THREE.OrthographicCamera(-viewSize*aspect, viewSize*aspect, viewSize, -viewSize, 0.1, 1000);
        camera.position.z = 10;

        // --- 2. INYECCIÓN DE CÁMARA (BACKGROUND) ---
        const videoElement = document.getElementById('input_video');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { 
                videoElement.srcObject = stream; 
                videoElement.play(); // Dispara el render engine
            })
            .catch(err => console.error("Error de cámara:", err));

        const videoTexture = new THREE.VideoTexture(videoElement);
        videoTexture.center.set(0.5, 0.5);
        videoTexture.repeat.set(-1, 1); // Espejo de la cámara
        scene.background = videoTexture;

        // --- 3. SISTEMA DE CAPAS (LAYERS) ---
        let layers = []; 
        let meshGroup = new THREE.Group();
        scene.add(meshGroup);

        function addLayer() {
            const url = document.getElementById('imgUrl').value;
            if (!url) return;

            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous'); // BYPASS CORS
            
            loader.load(url, (texture) => {
                const imgAspect = texture.image.width / texture.image.height;
                const baseWidth = viewSize * aspect * 1.5; 
                
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthTest: false });
                const geometry = new THREE.PlaneGeometry(baseWidth, baseWidth / imgAspect);
                const mesh = new THREE.Mesh(geometry, material);
                
                meshGroup.add(mesh);

                const layerData = {
                    id: Date.now(),
                    mesh: mesh,
                    scale: 1
                };
                
                layers.push(layerData);
                updateRenderOrder();
                renderUI();
                document.getElementById('imgUrl').value = '';
            });
        }

        // Manejo de profundidad (Z-Index sin distorsionar tamaño)
        function updateRenderOrder() {
            layers.forEach((layer, index) => {
                layer.mesh.renderOrder = index; 
                layer.mesh.position.z = index * 0.1; // Anti Z-fighting
            });
        }

        function removeLayer(index) {
            meshGroup.remove(layers[index].mesh);
            layers[index].mesh.geometry.dispose();
            layers[index].mesh.material.dispose();
            layers.splice(index, 1);
            updateRenderOrder();
            renderUI();
        }

        function moveLayer(index, direction) {
            if (direction === -1 && index > 0) {
                // Atrás
                [layers[index], layers[index - 1]] = [layers[index - 1], layers[index]];
            } else if (direction === 1 && index < layers.length - 1) {
                // Frente
                [layers[index], layers[index + 1]] = [layers[index + 1], layers[index]];
            }
            updateRenderOrder();
            renderUI();
        }

        window.updateLayerScale = function(index) {
            const l = layers[index];
            l.scale = parseFloat(document.getElementById(`s-${l.id}`).value);
            l.mesh.scale.set(l.scale, l.scale, 1);
        }

        // --- 4. INTERACCIÓN ESPACIAL (RAYCASTER DRAG & DROP) ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let selectedMesh = null;
        let dragOffset = new THREE.Vector3();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // Plano invisible de arrastre

        canvas.addEventListener('pointerdown', (event) => {
            const rect = canvas.getBoundingClientRect();
            pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            
            const intersects = raycaster.intersectObjects(meshGroup.children);

            if (intersects.length > 0) {
                // Forzar agarre del asset que está visualmente al frente
                intersects.sort((a, b) => b.object.renderOrder - a.object.renderOrder);
                selectedMesh = intersects[0].object;
                
                // Calcular diferencia entre centro geométrico y click
                dragOffset.copy(selectedMesh.position).sub(intersects[0].point);
            }
        });

        canvas.addEventListener('pointermove', (event) => {
            if (!selectedMesh) return;
            
            const rect = canvas.getBoundingClientRect();
            pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            
            const target = new THREE.Vector3();
            dragPlane.constant = -selectedMesh.position.z; 
            raycaster.ray.intersectPlane(dragPlane, target);
            
            // Asignar nueva coordenada + offset inicial
            selectedMesh.position.x = target.x + dragOffset.x;
            selectedMesh.position.y = target.y + dragOffset.y;
        });

        window.addEventListener('pointerup', () => { 
            selectedMesh = null; 
        });

        // --- 5. RENDER UI DINÁMICO ---
        function renderUI() {
            const container = document.getElementById('layers-container');
            container.innerHTML = '';

            layers.forEach((layer, index) => {
                const card = document.createElement('div');
                card.className = 'layer-card';
                card.innerHTML = `
                    <div class="layer-header">
                        <span>Layer ${index + 1}</span>
                        <div class="order-btns">
                            <button onclick="moveLayer(${index}, -1)" title="Mover Atrás">▼</button>
                            <button onclick="moveLayer(${index}, 1)" title="Mover al Frente">▲</button>
                            <button class="del-btn" onclick="removeLayer(${index})">X</button>
                        </div>
                    </div>
                    <div class="layer-controls">
                        <label>Escala</label>
                        <input type="range" id="s-${layer.id}" min="0.1" max="4" step="0.05" value="${layer.scale}" oninput="updateLayerScale(${index})">
                    </div>
                    <div style="font-size:10px; color:#888; margin-top:10px;">Arrastra la imagen directamente en el canvas para posicionarla.</div>
                `;
                container.prepend(card); 
            });
        }

        // --- 6. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- 7. EXPORTACIÓN DE MEDIA ---
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];

        function takePhoto() {
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `SGX_Frame_${Date.now()}.png`;
            a.click();
        }

        function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            if (!isRecording) {
                const stream = canvas.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `SGX_Video_${Date.now()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                    recordedChunks = [];
                };
                mediaRecorder.start();
                isRecording = true;
                btn.innerText = '⬛ STOP REC';
                btn.style.background = 'white'; btn.style.color = 'black';
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.innerText = '🔴 Grabar';
                btn.style.background = '#ff3333'; btn.style.color = 'white';
            }
        }
    </script>
</body>
</html>
